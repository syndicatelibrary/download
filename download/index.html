<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mini HTML App Builder</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    background: #1a1a1a;
    padding: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid #333;
  }

  button, label {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 13px;
  }

  button:active { background: #444; }

  textarea {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: #000;
    color: #0f0;
    padding: 10px;
    font-size: 12px;
    font-family: monospace;
  }

  input[type="file"] {
    display: none;
  }
</style>
</head>

<body>

<header>
  <button onclick="loadTemplate()">Template</button>
  <button onclick="previewHTML()">Preview</button>
  <button onclick="exportHTML()">Export</button>
  <button onclick="clearEditor()">Clear</button>

  <label>
    Import
    <input type="file" accept=".html,.txt" onchange="importFile(this)">
  </label>
</header>

<textarea id="editor" spellcheck="false"></textarea>

<script>
const editor = document.getElementById("editor");

/* ---------- TEMPLATE ---------- */
const TEMPLATE_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My App</title>

<style>
  body {
    background:#000;
    color:#fff;
    font-family:sans-serif;
  }
</style>
</head>

<body>

<h1>Hello world</h1>

<script>
  console.log("app loaded");
<\/script>

</body>
</html>`;

/* ---------- FUNCTIONS ---------- */

function loadTemplate() {
  if (editor.value.trim() && !confirm("Replace current code?")) return;
  editor.value = TEMPLATE_HTML;
}

function clearEditor() {
  if (!editor.value.trim()) return;
  if (confirm("Clear everything?")) editor.value = "";
}

function previewHTML() {
  const win = window.open("about:blank");
  win.document.open();
  win.document.write(editor.value);
  win.document.close();
}

function exportHTML() {
  const blob = new Blob([editor.value], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = getTitle() || "app.html";
  a.click();
  URL.revokeObjectURL(a.href);
}

function importFile(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => editor.value = e.target.result;
  reader.readAsText(file);
}

/* ---------- AUTO FILENAME ---------- */
function getTitle() {
  const match = editor.value.match(/<title>(.*?)<\/title>/i);
  return match ? match[1].replace(/[^\w\d]+/g, "_") + ".html" : null;
}
</script>

</body>
</html>
